<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WB.Computer vision topics</title>
    <!--
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    -->
    <link href="static/css/bootstrap.min.css" rel="stylesheet" >
    <link href="static/css/katex.min.css" rel="stylesheet" >
    <style>
      .page-shell {
        max-width: 1100px;
        margin: 0 auto;
        padding: 24px 16px 40px;
      }

      .filter-bar {
        max-width: 480px;
        margin-bottom: 24px;
      }

      .page-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 16px;
        margin-bottom: 12px;
      }

      .page-header-controls {
        display: flex;
        align-items: flex-start;
        gap: 8px;
      }

      .page-status-badge {
        margin-top: 6px;
        white-space: nowrap;
      }

      #main {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .filter-item {
        margin: 0;
      }

      .filter-trigger {
        margin: 0;
      }

      .filter-collapse > .card {
        margin-top: 6px;
      }

      .filter-collapse > .card > .card-body {
        padding: 10px 12px;
      }

      .filter-children {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .filter-leaf + .filter-leaf {
        margin-top: 8px;
      }

      .filter-link-row {
        display: flex;
        flex-wrap: nowrap;
        gap: 8px;
        width: 100%;
        overflow-x: auto;
        align-items: center;
        justify-content: flex-end;
      }

      .filter-link-row .badge {
        flex: 0 0 auto;
      }

      .filter-item > .btn {
        display: inline-block;
      }

      .page-footer {
        margin-top: 24px;
      }
    </style>
  </head>
  <body>
    <div class="page-shell">
      <div class="page-header">
        <h1 class="mb-0">Computer vision topics</h1>
        <div class="page-header-controls">
          __STATUS_BADGE__
          __REFRESH_FORM__
        </div>
      </div>
      <div class="filter-bar">
        <input
          id="page-filter"
          class="form-control"
          type="search"
          placeholder="Filter topics and questions"
          autocomplete="off"
        >
      </div>
      <div id="main" class="container-fluid px-0">

        <!-- Content here -->
        {}

      </div>
      __PAGE_FOOTER__
    </div>

    <!--
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    -->
    <script src="static/js/bootstrap.bundle.min.js" ></script>
    <script src="static/js/katex.min.js"></script>
    <script src="static/js/auto-render.min.js"></script>
    <script>
      const filterInput = document.getElementById("page-filter");
      const rootItems = Array.from(document.querySelectorAll("#main > .filter-item"));

      document.querySelectorAll("#main .filter-leaf").forEach((element) => {
        renderMathInElement(element, {
          delimiters: [
            { left: "$$", right: "$$", display: true },
            { left: "$", right: "$", display: false }
          ],
          throwOnError: false
        });
      });

      function getChildItems(item) {
        const childContainer = item.querySelector(":scope > .filter-collapse .filter-children");
        if (!childContainer) {
          return [];
        }
        return Array.from(childContainer.children).filter((child) => child.classList.contains("filter-item"));
      }

      function applyFilter(item, query) {
        const label = item.querySelector(":scope .filter-label")?.textContent.toLowerCase() || "";
        const childItems = getChildItems(item);
        let hasVisibleChild = false;

        childItems.forEach((child) => {
          hasVisibleChild = applyFilter(child, query) || hasVisibleChild;
        });

        const matchesLabel = !query || label.includes(query);
        const isVisible = !query || matchesLabel || hasVisibleChild;
        item.style.display = isVisible ? "" : "none";

        const collapse = item.querySelector(":scope > .filter-collapse");
        const trigger = item.querySelector(":scope > .filter-trigger .filter-label");
        if (collapse) {
          const shouldExpand = Boolean(query) && hasVisibleChild;
          collapse.classList.toggle("show", shouldExpand);
          if (trigger) {
            trigger.setAttribute("aria-expanded", shouldExpand ? "true" : "false");
          }
        }

        return isVisible;
      }

      function runFilter() {
        const query = filterInput.value.trim().toLowerCase();
        rootItems.forEach((item) => applyFilter(item, query));
      }

      filterInput.addEventListener("input", runFilter);
    </script>
  </body>
</html>
