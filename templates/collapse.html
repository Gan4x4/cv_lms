<div class="filter-item">
  <p class="filter-trigger d-inline-flex gap-1 mb-2">
    <a class="filter-label btn btn-primary" data-bs-toggle="collapse" href="#{id}" role="button" aria-expanded="false" aria-controls="{id}" >
      {name}
    </a>
  </p>
  <div class="collapse filter-collapse" id="{id}">
    <div class="card card-body">
      <div class="filter-children">
        {text}
      </div>
    </div>
  </div>
</div>
